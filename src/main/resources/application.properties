spring.application.name=moneymanager-api
spring.profiles.active=prod

server.port=4040

spring.datasource.url=jdbc:mysql://localhost:3306/moneymanager-db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


#jpa configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql= true
spring.jpa.properties.hibernate.format_sql=true

server.servlet.context-path=/api/v1.0

#email configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME}
spring.mail.password=${GMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.protocol=smtp
#spring.mail.properties.mail.smtp.from=humzaansari53@gmail.com


jwt.secret.key=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9eyJ1c2VySWQiOiIxMjM0NTYifQSflKxwRJSMeKKF2QT4fwpMeJf36POk6yJVadQssw5c
app.activation.base-url=${MONEY_MANAGER_BACKEND_URL}

jwt.access.expiration=86400000
jwt.refresh.expiration=604800000

authenticate.url=http://localhost:2186/api/v1.0

# Simplify logging format (only show level and message)
logging.pattern.console=%-5level : %msg%n

money.manager.frontend.url=${MONEY_MANAGER_FRONTED_URL}

# Enable caching
spring.cache.type=caffeine

# Caffeine config
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=10m,recordStats


# Cache logging (debug)
logging.level.org.springframework.cache=DEBUG
logging.level.org.springframework.cache.interceptor=TRACE





